<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#12161a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>Meccha Chameleon</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
        background: #12161a;
        color: #eef3ee;
        font-family: system-ui, sans-serif;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .t {
        font-size: 26px;
        font-weight: 800;
        background: linear-gradient(90deg, #8ef0a0, #5ad1ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #splash .s { font-size: 13px; opacity: 0.6; }
      #splash .dot {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #66d17a;
        animation: spin 0.9s linear infinite;
        margin-top: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <div id="splash">
      <div class="t">Meccha Chameleon</div>
      <div class="s">loading…</div>
      <div class="dot"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
